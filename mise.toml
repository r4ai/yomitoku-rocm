[tools]
python = "3.12"
uv = "latest"

[tasks.sync]
description = "Install locked Python dependencies with uv"
run = "uv sync"

[tasks.lock]
description = "Update uv.lock without installing packages"
run = "uv lock"

[tasks.doctor]
description = "Check WSL ROCm, PyTorch, and YomiToku availability"
run = "uv run yomitoku-pdf-doctor"

[tasks.setup-wsl-rocm]
description = "Install ROCm and ROCDXG for WSL. Requires sudo."
run = "bash scripts/setup-wsl-rocm.sh"

[tasks.ocr]
description = "Run YomiToku OCR on a PDF or image. Usage: mise run ocr -- input.pdf [args...]"
run = "uv run yomitoku-pdf"
